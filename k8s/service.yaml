apiVersion: v1
kind: Service
metadata:
  name: oauth2-server
  namespace: auth
spec:
  selector:
    app: oauth2-server
  ports:
    - name: http
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
  type: ClusterIP
