# ============================
# 🔌 Configuración del Servidor
# ============================
management.server.port=8080
server.address=0.0.0.0
server.port=${PORT:8443}

# ============================
# 🍪 Sesión
# ============================
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# ============================
# 📊 LOGGING - Producción (menos verbose)
# ============================
logging.level.root=WARN
logging.level.com.oauth.rest=INFO
logging.level.com.oauth.rest.security.oauth2=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# ============================
# 📦 Recursos estáticos
# ============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
spring.mvc.static-path-pattern=/**

# Resolver desde múltiples ubicaciones
spring.web.resources.static-locations=file:/app/static/,classpath:/static/,file:/app/templates/

# ============================
# 🔌 Base de datos PostgreSQL - PRODUCCIÓN
# ============================
# SIN VALORES POR DEFECTO - Todas las credenciales vienen del entorno
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones optimizado para producción
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=10000

# ============================
# 🗄️ JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================
# 📦 Inicialización de datos
# ============================
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ============================
# 🔄 Flyway - Producción (seguro)
# ============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# ============================
# 🛡️ Seguridad SSL
# ============================
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEY_STORE}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.protocol=TLSv1.3

# Deshabilitar jsessionid en URL (solo cookies)
server.servlet.session.tracking-modes=cookie

# ============================
# 🔄 Forward Headers (para proxy inverso)
# ============================
server.forward-headers-strategy=framework
server.use-forward-headers=true
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
server.tomcat.internal-proxies=10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|169\\.254\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.2[0-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]{1}\\.\\d{1,3}\\.\\d{1,3}|0:0:0:0:0:0:0:1|::1

# ============================
# 🔐 OAuth2 - Configuración tokens
# ============================
oauth2.access-token-validity-seconds=${ACCESS_TOKEN_VALIDITY:86400}
oauth2.refresh-token-validity-seconds=${REFRESH_TOKEN_VALIDITY:1296000}

# ============================
# 📋 CLIENTES OAuth2 - Producción (SIN DEFAULTS)
# ============================

# Cliente 0 - cine-platform
oauth2.clients[0].client-id=cine-platform
oauth2.clients[0].client-secret=${CINE_PLATFORM_SECRET}
oauth2.clients[0].redirect-uris[0]=${CINE_PLATFORM_REDIRECT_URI}
oauth2.clients[0].scopes[0]=openid
oauth2.clients[0].scopes[1]=profile
oauth2.clients[0].scopes[2]=read
oauth2.clients[0].scopes[3]=write
oauth2.clients[0].require-consent=false
oauth2.clients[0].require-proof-key=false
oauth2.clients[0].authorization-grant-types=authorization_code,refresh_token,client_credentials

# Cliente 1 - transcribeapp
oauth2.clients[1].client-id=transcribeapp
oauth2.clients[1].client-secret=${TRANSCRIBEAPP_SECRET}
oauth2.clients[1].redirect-uris[0]=${TRANSCRIBEAPP_REDIRECT_URI}
oauth2.clients[1].scopes[0]=openid
oauth2.clients[1].scopes[1]=profile
oauth2.clients[1].scopes[2]=read
oauth2.clients[1].scopes[3]=write
oauth2.clients[1].require-consent=false
oauth2.clients[1].require-proof-key=false
oauth2.clients[1].authorization-grant-types=authorization_code,refresh_token,client_credentials

# ============================
# 🔑 JWT - Producción
# ============================
spring.security.oauth2.authorizationserver.issuer=${ISSUER_URL}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URL}
spring.security.oauth2.resourceserver.jwt.audiences=${JWT_AUDIENCE}
oauth2.jwt-signing-key=${JWT_SIGNING_KEY}

# ============================
# 📊 Actuator (monitorización)
# ============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.status.http-mapping.down=503
management.endpoint.health.status.http-mapping.out_of_service=503
management.health.db.enabled=true
management.health.diskspace.enabled=true

# Métricas básicas
management.metrics.export.simple.enabled=true
management.metrics.tags.application=oauth2-server