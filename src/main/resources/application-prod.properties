management.server.port=8080
server.address=0.0.0.0
server.port=8443

# ============================
# 📊 LOGGING
# ============================
logging.level.root=INFO
logging.level.com.oauth.rest=INFO
logging.level.com.oauth.rest.security.oauth2=DEBUG
logging.level.org.springframework.security=DEBUG

# STATICS
spring.web.resources.static-locations=file:/app/static/,classpath:/static/
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
spring.mvc.static-path-pattern=/**

# Resolver desde múltiples ubicaciones
spring.web.resources.static-locations[0]=file:/app/static/
spring.web.resources.static-locations[1]=classpath:/static/
spring.web.resources.static-locations[2]=file:/app/templates/

# ============================
# 🔌 Base de datos (en producción, mejor PostgreSQL)
# ============================
spring.datasource.url=jdbc:h2:mem:oauth2db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.username=${H2_USERNAME:sa}
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# ============================
# 🗄️ JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=false

# ============================
# 🔄 Flyway
# ============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.depends-on=entityManagerFactory

# ============================
# 🛡️ Seguridad
# ============================
spring.h2.console.enabled=false
server.port=${PORT:8443}

# ============================
# 🔐 OAuth2 - Configuración base para tokens
# ============================
oauth2.access-token-validity-seconds=${ACCESS_TOKEN_VALIDITY:86400}
oauth2.refresh-token-validity-seconds=${REFRESH_TOKEN_VALIDITY:1296000}

# ============================
# 📋 CLIENTES OAuth2 (MÚLTIPLES)
# ============================

# Cliente 0 - cine-platform
oauth2.clients[0].client-id=cine-platform
oauth2.clients[0].client-secret=${CINE_PLATFORM_SECRET}
oauth2.clients[0].redirect-uris[0]=${CINE_PLATFORM_REDIRECT_URI}
oauth2.clients[0].scopes[0]=openid
oauth2.clients[0].scopes[1]=profile
oauth2.clients[0].scopes[2]=read
oauth2.clients[0].scopes[3]=write
oauth2.clients[0].require-consent=false
oauth2.clients[0].require-proof-key=false

# Cliente 1 - transcribeapp
oauth2.clients[1].client-id=transcribeapp
oauth2.clients[1].client-secret=${TRANSCRIBEAPP_SECRET}
oauth2.clients[1].redirect-uris[0]=${TRANSCRIBEAPP_REDIRECT_URI}
oauth2.clients[1].scopes[0]=openid
oauth2.clients[1].scopes[1]=profile
oauth2.clients[1].scopes[2]=read
oauth2.clients[1].scopes[3]=write
oauth2.clients[1].require-consent=true
oauth2.clients[1].require-proof-key=false

# ============================
# 🔑 JWT
# ============================
spring.security.oauth2.authorizationserver.issuer=${ISSUER_URL}
spring.security.oauth2.authorizationserver.tokenendpoint.grant-types=password,refresh_token,client_credentials
spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URL}
spring.security.oauth2.resourceserver.jwt.audiences=${JWT_AUDIENCE}
oauth2.jwt-signing-key=${JWT_SIGNING_KEY}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================
# 🔐 SSL / HTTPS (PRODUCCIÓN)
# ============================
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEY_STORE:/keystore/keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=PKCS12

# Deshabilitar jsessionid en URL (solo cookies)
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
