name: OAuth2Server CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # No se necesita servicio PostgreSQL para el CI - usamos H2 en memoria
    # como en el perfil dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -q

      - name: Run tests with coverage
        run: mvn test
        env:
          SPRING_PROFILES_ACTIVE: dev

      - name: Verify coverage
        run: mvn verify -DskipTests=false
        env:
          SPRING_PROFILES_ACTIVE: dev

      - name: Build package
        run: mvn package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: dev

      - name: Verify application starts
        run: |
          # Start the application in the background
          java -jar target/OAuth2Server-0.0.1-SNAPSHOT.jar &
          APP_PID=$!
          
          # Wait for the application to start (max 60 seconds)
          for i in {1..60}; do
            if curl -s http://localhost:8080/login > /dev/null 2>&1; then
              echo "Application started successfully"
              break
            fi
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "Application failed to start"
              exit 1
            fi
            sleep 1
          done
          
          # Check if the application is running
          if curl -s http://localhost:8080/login > /dev/null 2>&1; then
            echo "Application is responding on port 8080"
          else
            echo "Application failed to respond"
            exit 1
          fi
          
          # Stop the application
          kill $APP_PID || true
        env:
          SPRING_PROFILES_ACTIVE: dev
          SERVER_PORT: 8080

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
